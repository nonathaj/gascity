nt-family="Virgil, Segoe UI Emoji" font-size="15px" fill="#495057" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">sessions come and go, the beads persist, and whoever picks the work up next</text><text x="0" y="69.465" font-family="Virgil, Segoe UI Emoji" font-size="15px" fill="#495057" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">finds the same state.</text></g></svg>