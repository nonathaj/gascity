# Windows Gate — fork-owned guardrail for the Windows port (gw-f6a).
#
# Two jobs, deliberately lean:
#   1. cross-compile: GOOS=windows go build ./... on ubuntu. Seconds of
#      runner time; catches every compile-level regression in the
#      _windows.go surface, which no other CI compiles.
#   2. unit-green: the curated green-list unit packages on windows-latest
#      (.github/windows-test-packages.txt). Grows as Phase 2 of the
#      Windows support plan lands.
#
# The cross-compile job also runs GOOS=windows go vet ./... — vet
# compiles test files, so this catches _test.go compile regressions on
# the _windows.go surface that no other CI sees (gw-l8d; the unix-only
# test-syscall files are now build-tagged).
name: Windows Gate

# Triggers: main, plus fix/** so parity-tranche branches validate on
# every push (the deleted windows-port branch was dead config — the
# gate silently never ran for months of branch work).
on:
  push:
    branches: [main, 'fix/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cross-compile:
    name: GOOS=windows cross-compile
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build all packages for windows/amd64
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: go build ./...
      - name: Vet all packages for windows/amd64 (compiles test files)
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: go vet ./...

  unit-green:
    name: Windows unit tests (green list)
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      # The Windows runner defaults to core.autocrlf=true, which rewrites
      # every committed LF text file to CRLF on checkout — then every test
      # that byte-compares a committed artifact against LF-generated content
      # (schema/census freshness, goldens, OpenAPI, signed vectors) fails
      # only here. Preserve LF so the runner matches Linux CI and dev boxes.
      - name: Preserve LF line endings on checkout
        run: git config --global core.autocrlf false
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # Install the SHA-pinned Dolt binary the same way Linux/mac CI does
      # (setup-gascity-ubuntu -> install-dolt-archive.sh), so the managed-Dolt
      # cmd/gc tests run on the runner instead of being skipped. --cache adds
      # the bin dir to GITHUB_PATH. Kept in lockstep with ci.yml's DOLT_VERSION.
      - name: Install Dolt
        shell: bash
        run: .github/scripts/install-dolt-archive.sh 2.1.7 --cache
      - name: Verify Dolt on PATH
        shell: pwsh
        run: dolt version
      - name: Run green-list packages
        shell: pwsh
        env:
          GC_FAST_UNIT: '1'
          # The Windows contract is the CGo-free build (WINDOWS_SUPPORT_PLAN
          # Appendix B): with the runner's MinGW gcc present, CGO_ENABLED
          # defaults to 1 and the Dolt chain pulls dolthub/go-icu-regex,
          # which needs ICU headers the runner lacks.
          CGO_ENABLED: '0'
        run: |
          $pkgs = Get-Content .github/windows-test-packages.txt |
            Where-Object { $_.Trim() -and -not $_.Trim().StartsWith('#') }
          Write-Host "Running $($pkgs.Count) packages"
          go test -count=1 -timeout 30m @pkgs

  unit-green-cmdgc:
    name: Windows unit tests (cmd/gc)
    runs-on: windows-latest
    # cmd/gc is one large package (~1,300 tests, many spawning managed Dolt);
    # it does not fit the shared green-list job's 30m budget, so it runs on its
    # own with generous headroom. Split into -run shards later if wall-clock
    # becomes painful (the boundaries are analyzed on gw-6ph).
    #
    # QUARANTINED (continue-on-error) until the runner-only "second wave" closes
    # (epic gw-85h): the GitHub-hosted runner differs from the dev box and the
    # Linux CI fleet (no global claude/codex/tmux CLIs, 8.3 short names, stricter
    # git longpath, hermetic managed-dolt), surfacing ~112 failures the dev box
    # masked. The job still runs and reports so the signal stays visible; it just
    # doesn't fail the whole gate while the cluster beads under gw-85h are driven
    # to green. Flip this back to hard-required once gw-85h closes.
    continue-on-error: true
    timeout-minutes: 75
    steps:
      - name: Preserve LF line endings on checkout
        run: git config --global core.autocrlf false
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install Dolt
        shell: bash
        run: .github/scripts/install-dolt-archive.sh 2.1.7 --cache
      - name: Verify Dolt on PATH
        shell: pwsh
        run: dolt version
      - name: Run cmd/gc
        shell: pwsh
        env:
          GC_FAST_UNIT: '1'
          CGO_ENABLED: '0'
        run: go test -count=1 -timeout 70m ./cmd/gc/
